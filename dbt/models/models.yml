version: 2

models:

  # =========================
  # INTERMEDIATE LAYER
  # =========================

  - name: int_customer_lifecycle
    columns:
      - name: customer_id
        tests: [not_null, unique]

  - name: int_customer_orders
    columns:
      - name: order_id
        tests: [not_null, unique]

  - name: int_order_items_enriched
    columns:
      - name: order_item_id
        tests: [not_null, unique]

  - name: int_marketing_sessions
    columns:
      - name: visit_id
        tests: [not_null, unique]


  # =========================
  # MART LAYER
  # =========================

  - name: dim_customers
    columns:
      - name: customer_id
        tests: [not_null, unique]

  - name: dim_products
    columns:
      - name: product_id
        tests: [not_null, unique]

  - name: fact_orders
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: order_day
        tests: [not_null]

  - name: fact_order_items
    columns:
      - name: order_item_id
        tests: [not_null, unique]

  - name: fact_marketing
    columns:
      - name: visit_day
        tests: [not_null]