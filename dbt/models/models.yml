version: 2

models:

  # ---------------- STAGING ----------------
  - name: int_customers
    columns:
      - name: customer_id
        data_tests: [not_null, unique]
      - name: country
        data_tests: [not_null]

  - name: int_products
    columns:
      - name: product_id
        data_tests: [not_null, unique]
      - name: price
        data_tests: [not_null]

  - name: int_orders
    columns:
      - name: order_id
        data_tests: [not_null, unique]
      - name: customer_id
        data_tests: [not_null]
      - name: status
        data_tests:
          - accepted_values:
              values: [delivered, pending, cancelled, returned]

  - name: int_order_items
    columns:
      - name: order_item_id
        data_tests: [not_null, unique]
      - name: order_id
        data_tests: [not_null]
      - name: product_id
        data_tests: [not_null]

  - name: int_visits
    columns:
      - name: visit_id
        data_tests: [not_null, unique]
      - name: source
        data_tests:
          - accepted_values:
              values: [ tiktok, google, instagram, youtube, affiliate, direct, email]

  # ---------------- MART ----------------
  - name: dim_customers
    columns:
      - name: customer_id
        tests: [not_null, unique]

  - name: dim_products
    columns:
      - name: product_id
        data_tests: [not_null, unique]

  - name: fact_orders
    columns:
      - name: order_id
        data_tests: [not_null, unique]
      - name: order_day
        data_tests: [not_null]

  - name: fact_order_items
    columns:
      - name: order_item_id
        data_tests: [not_null, unique]

  - name: fact_marketing
    columns:
      - name: visit_day
        data_tests: [not_null]