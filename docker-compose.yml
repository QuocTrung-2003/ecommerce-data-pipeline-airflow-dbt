services:
#---------------------POSTGRES---------------------#

  postgres:
    build:
      context: .
      dockerfile: postgres/Dockerfile
    container_name: postgres

    env_file:
      - .env
      
    secrets:
      - bi_user
      - bi_password

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
      
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 30

#---------------------API---------------------#

  mock-api:
    build: ./mock_api
    container_name: mock-api

    env_file:
      - ./mock_api/.env.app

    ports:
      - "8000:8000"

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

    depends_on:
      postgres:
        condition: service_healthy

#---------------------AIRFLOW---------------------#

  airflow-init:
    build: ./airflow
    container_name: airflow-init
    env_file:
      - .env
      - ./airflow/.env.airflow
    depends_on:
      postgres:
        condition: service_healthy

    entrypoint: /bin/bash
    command: >
      -c "
      airflow db init &&
      airflow users create \
        --role Admin \
        --username ${AIRFLOW_ADMIN_USER:-admin} \
        --password ${AIRFLOW_ADMIN_PASSWORD:-admin} \
        --firstname Admin \
        --lastname User \
        --email admin@example.com || true &&
      airflow connections add postgres_default \
        --conn-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB} || true
      "

  airflow-webserver:
    build: ./airflow
    container_name: airflow-webserver
    env_file:
      - .env
      - ./airflow/.env.airflow

    command: webserver

    ports:
      - "8080:8080"

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt:/usr/app
      - ./dbt/profiles:/opt/airflow/.dbt

    depends_on:
      airflow-init:
        condition: service_completed_successfully


  airflow-scheduler:
    build: ./airflow
    container_name: airflow-scheduler
    env_file:
      - .env
      - ./airflow/.env.airflow

    command: scheduler

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt:/usr/app
      - ./dbt/profiles:/opt/airflow/.dbt

    depends_on:
      airflow-init:
        condition: service_completed_successfully

#---------------------DBT---------------------#       

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.latest
    container_name: dbt

    working_dir: /usr/app

    env_file:
      - .env

    environment:
      DBT_PROFILES_DIR: /root/.dbt

    volumes:
      - ./dbt:/usr/app
      - ./dbt/profiles:/root/.dbt

    depends_on:
      postgres:
        condition: service_healthy

    command: >
      bash -c "
      dbt deps &&
      dbt build --profiles-dir /root/.dbt &&
      tail -f /dev/null
      "

volumes:
  pgdata: {}

secrets:
  bi_user:
    file: ./secrets/bi_user.txt
  bi_password:
    file: ./secrets/bi_password.txt